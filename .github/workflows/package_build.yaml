name: Build and Release

on:
  push:
    branches: [packaging-test]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            artifact_name: linux-x64
          - os: windows-latest
            artifact_name: windows-x64.exe
          - os: macos-latest
            artifact_name: macos-x64

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"
          architecture: ${{ runner.os == 'Windows' && 'x64' || '' }}

      - name: Install tools
        run: |
          python -m pip install --upgrade pip
          pip install build wheel pyinstaller

      - name: Build package
        run: |
          python -m build --wheel --no-isolation
          ls dist/
        
      - name: Fix Windows wheel names
        if: runner.os == 'Windows'
        shell: cmd
        run: |
          cd dist
          for %%f in (*-cp*-*-*.whl) do (
            for /f "tokens=1-3* delims=-" %%a in ("%%~nf") do (
              ren "%%f" "%%a-%%b-py3-none-%%d.whl"
            )
          )

      - name: Create Linux executable
        if: matrix.os == 'ubuntu-latest'
        run: |
          pip install ./dist/*.whl
          pyinstaller --onefile --name ecoserver $(which eco-ext)
          mv dist/ecoserver dist/ecoserver-${{ matrix.artifact_name }}

      - name: Create Windows executable
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          # 1. Find the exact wheel file
          $wheelPath = (Get-ChildItem dist -Filter "ecooptimizer-*.whl" | Select-Object -First 1).FullName
          if (-not $wheelPath) { Write-Error "No wheel file found"; exit 1 }
      
          # 2. Install using absolute path
          pip install "$wheelPath"
      
          $entry = python -c "from importlib.metadata import entry_points; print([ep.value for ep in entry_points()['console_scripts'] if ep.name == 'eco-ext'][0])"
          $pyPath = $entry.Split(':')[0].Replace('.', '\') + '.py'
          pyinstaller --onefile --name ecoserver "src/$pyPath"
          Move-Item dist\ecoserver.exe "dist\ecoserver-${{ matrix.artifact_name }}"

      - name: Create macOS executable
        if: matrix.os == 'macos-latest'
        run: |
          pip install ./dist/*.whl
          pyinstaller --onefile --name ecoserver $(which eco-ext)
          mv dist/ecoserver dist/ecoserver-${{ matrix.artifact_name }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binaries-${{ matrix.os }}
          path: |
            dist/*.whl
            dist/ecoserver-*

  create-release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v1
        with:
          name: Version ${{ github.ref_name }}
          files: |
            artifacts/**/*.whl
            artifacts/**/ecoserver-*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}